<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html">

<h:head></h:head>
<body>
	<h1 align="center">Add Music Album Response</h1>
	<div align="center">
		<table>
			<tr>
				<td align="left"><h:outputLabel for="title">Title</h:outputLabel></td>
				<td><h:outputText id="title" value="#{album.title}"></h:outputText></td>
			</tr>
			<tr>
				<td align="left"><h:outputLabel for="artist">Artist</h:outputLabel></td>
				<td><h:outputText id="artist" value="#{album.artist}"></h:outputText></td>
			</tr>
			<tr>
				<td align="left"><h:outputLabel for="year">Year</h:outputLabel></td>
				<td><h:outputText id="year" value="#{album.year}"></h:outputText></td>
			</tr>
			<tr>
				<td align="left"><h:outputLabel for="numberOfTracks">Number of Tracks Found</h:outputLabel></td>
				<td><h:outputText id="numberOfTracks"
						value="#{album.getNumberTracks()}"></h:outputText></td>
			</tr>
		</table>
		<h:form align="center">
			<h:commandButton id="add-another" value="Add Another"
				action="AddAlbumForm.xhtml"></h:commandButton>
		</h:form>
	</div>
</body>
</html>
